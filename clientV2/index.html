<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>RTS.io</title>
	<link rel="stylesheet" href="/style.css" />
	<style>
		body {
			overflow: auto;
			background-color: #333344;
			color: #eed7a1;
			font-family: 'Times New Roman', Times, serif;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
		}

		#lobby-container {
			text-align: center;
			padding: 40px;
		}

		#lobby-container h1 {
			font-size: 3rem;
			margin-bottom: 30px;
		}

		.lobby-section {
			margin: 20px 0;
			padding: 20px;
			background: rgba(238, 215, 161, 0.1);
			border-radius: 8px;
		}

		.lobby-section h2 {
			margin-bottom: 15px;
		}

		input[type="text"] {
			font-family: 'Times New Roman', Times, serif;
			font-size: 1.25rem;
			padding: 10px 15px;
			border: 2px solid #80714f;
			border-radius: 3px;
			background: #eed7a1;
			color: #333;
			text-align: center;
			text-transform: uppercase;
			letter-spacing: 3px;
			width: 150px;
		}

		input[type="text"]::placeholder {
			text-transform: none;
			letter-spacing: normal;
			color: #999;
		}

		#game-code-display {
			font-size: 2rem;
			letter-spacing: 5px;
			font-weight: bold;
			margin: 10px 0;
			color: #fff;
		}

		#status-message {
			margin-top: 15px;
			font-size: 1.1rem;
			min-height: 1.5em;
		}

		.lobby-divider {
			margin: 20px 0;
			font-size: 1.25rem;
			opacity: 0.5;
		}
	</style>
</head>

<body>
	<div id="lobby-container">
		<h1>RTS.io</h1>

		<div class="lobby-section">
			<h2>Host a Game</h2>
			<button id="create-game" class="pushable">
				<span class="front">Create Game</span>
			</button>
			<div id="game-code-display" style="display: none;"></div>
		</div>

		<div class="lobby-divider">- or -</div>

		<div class="lobby-section">
			<h2>Join a Game</h2>
			<input type="text" id="join-code" placeholder="Enter code" maxlength="6" />
			<button id="join-game" class="pushable">
				<span class="front">Join</span>
			</button>
		</div>

		<div class="lobby-section">
			<button id="play-offline" class="pushable">
				<span class="front">Play Offline</span>
			</button>
		</div>

		<div id="status-message"></div>
	</div>

	<script type="module" src="/src/lobby/lobby.ts"></script>
</body>

</html>
