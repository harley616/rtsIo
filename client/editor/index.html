<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>RTS.io — Map Builder</title>
	<link rel="stylesheet" href="/style.css" />
	<style>
		#editor-panel {
			position: fixed;
			top: 0;
			left: 0;
			width: 240px;
			height: 100vh;
			box-sizing: border-box;
			padding: 16px;
			background: rgba(30, 30, 40, 0.92);
			color: #eed7a1;
			font-family: 'Times New Roman', Times, serif;
			overflow-y: auto;
			z-index: 10;
		}

		#editor-panel h1 {
			font-size: 1.5rem;
			margin: 0 0 12px;
		}

		#editor-panel h2 {
			font-size: 1rem;
			margin: 18px 0 6px;
			opacity: 0.7;
			border-bottom: 1px solid rgba(238, 215, 161, 0.2);
		}

		.tool-btn,
		.action-btn {
			display: block;
			width: 100%;
			margin: 4px 0;
			padding: 8px;
			font-family: inherit;
			font-size: 0.95rem;
			text-align: left;
			color: #eed7a1;
			background: rgba(238, 215, 161, 0.08);
			border: 1px solid #80714f;
			border-radius: 4px;
			cursor: pointer;
		}

		.tool-btn:hover,
		.action-btn:hover {
			background: rgba(238, 215, 161, 0.18);
		}

		.tool-btn.active {
			background: #80714f;
			color: #fff;
			font-weight: bold;
		}

		#map-name,
		#map-list {
			width: 100%;
			box-sizing: border-box;
			margin: 4px 0;
			padding: 6px;
			font-family: inherit;
			background: #eed7a1;
			color: #333;
			border: 1px solid #80714f;
			border-radius: 3px;
		}

		#editor-status {
			margin-top: 12px;
			font-size: 0.85rem;
			min-height: 2.5em;
			line-height: 1.3;
		}

		.hint {
			font-size: 0.75rem;
			opacity: 0.6;
			margin: 6px 0;
		}
	</style>
</head>

<body>
	<div id="threejs-container"></div>

	<div id="editor-panel">
		<h1>Map Builder</h1>

		<h2>Tools</h2>
		<button id="tool-gold" class="tool-btn">Gold node</button>
		<button id="tool-stone" class="tool-btn">Stone node</button>
		<button id="tool-wood" class="tool-btn">Wood node</button>
		<button id="tool-spawn1" class="tool-btn">Player 1 start</button>
		<button id="tool-spawn2" class="tool-btn">Player 2 start</button>
		<button id="tool-erase" class="tool-btn">Erase</button>
		<p class="hint">Left-click to place · right-click to erase · WASD/arrows pan · scroll to zoom</p>

		<h2>Map</h2>
		<input type="text" id="map-name" placeholder="Map name" />
		<button id="btn-save" class="action-btn">Save</button>
		<button id="btn-new" class="action-btn">New</button>
		<button id="btn-playtest" class="action-btn">Playtest (offline)</button>

		<h2>Saved maps</h2>
		<select id="map-list"></select>
		<button id="btn-load" class="action-btn">Load selected</button>
		<button id="btn-delete" class="action-btn">Delete selected</button>

		<h2>Share</h2>
		<button id="btn-export" class="action-btn">Export to file</button>
		<button id="btn-import" class="action-btn">Import from file</button>
		<input type="file" id="import-file" accept=".json,.rtsmap.json,application/json" style="display:none" />

		<h2>&nbsp;</h2>
		<button id="btn-lobby" class="action-btn">← Back to lobby</button>

		<div id="editor-status"></div>
	</div>

	<script type="module" src="/src/editor/editor.ts"></script>
</body>

</html>
